# Signature — phone/tablet IP access (port 80, :8080 ki zaroorat nahi)
# SERVER_IP placeholder — script auto replace karti hai
<VirtualHost *:80>
    ServerName SERVER_IP
    DocumentRoot "C:/laragon/www/signature/public"
    <Directory "C:/laragon/www/signature/public">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
