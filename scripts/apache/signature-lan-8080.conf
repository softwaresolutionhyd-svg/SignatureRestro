# Signature LAN access — port 8080 (IP se bina hostname ke)
# Setup: scripts\setup-signature-lan-network.bat (Admin)
<VirtualHost *:8080>
    DocumentRoot "C:/laragon/www/signature/public"
    ServerName signature-lan.local
    <Directory "C:/laragon/www/signature/public">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
