name: Deploy to Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/.env.*
            **/backup/**
            **/storage/logs/**
            **/storage/framework/sessions/**
            **/storage/framework/cache/**

      - name: Run migrations on server
        continue-on-error: true
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_MIGRATE_URL: ${{ secrets.DEPLOY_MIGRATE_URL }}
        run: |
          if [ -z "$DEPLOY_KEY" ] || [ -z "$DEPLOY_MIGRATE_URL" ]; then
            echo "Skip migrate: DEPLOY_KEY / DEPLOY_MIGRATE_URL secrets not set in GitHub."
            exit 0
          fi
          curl -sfS -X POST \
            -H "X-Deploy-Key: $DEPLOY_KEY" \
            "$DEPLOY_MIGRATE_URL"
