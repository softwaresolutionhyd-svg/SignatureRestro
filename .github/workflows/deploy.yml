name: Deploy to Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Zip vendor for reliable single-file upload
        run: |
          rm -f vendor.zip
          zip -r -q vendor.zip vendor
          ls -lh vendor.zip

      - name: Deploy code via FTP (exclude vendor folder — zip uploaded separately)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          timeout: 600000
          exclude: |
            **/.git*
            **/.git*/**
            **/.cursor/**
            **/.cursor*/**
            **/node_modules/**
            **/vendor/**
            **/vendor.zip
            **/.env
            **/.env.*
            **/backup/**
            **/dist/**
            **/order_taker_app/**
            **/storage/logs/**
            **/storage/framework/sessions/**
            **/storage/framework/cache/**
            **/.ftp-deploy-sync-state.json
            **/scripts/tools/mkcert.exe

      - name: Upload vendor.zip with FTP retries
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          DIR="${FTP_SERVER_DIR:-/}"
          DIR="${DIR%/}"
          lftp -c "
            set ftp:ssl-allow no;
            set net:max-retries 30;
            set net:reconnect-interval-base 5;
            set net:timeout 120;
            set xfer:clobber on;
            open -u ${FTP_USERNAME},${FTP_PASSWORD} ftp://${FTP_SERVER};
            cd ${DIR};
            put -O . vendor.zip;
            bye
          "
          echo "vendor.zip uploaded"

      - name: Extract vendor on hosting
        run: |
          curl -sfS --retry 5 --retry-delay 3 \
            "https://signature.softwaresolutions.pk/extract-vendor.php" \
            | tee /tmp/extract-out.txt
          grep -q "OK vendor/autoload.php" /tmp/extract-out.txt

      - name: Run migrations on server
        continue-on-error: true
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_MIGRATE_URL: ${{ secrets.DEPLOY_MIGRATE_URL }}
        run: |
          if [ -z "$DEPLOY_KEY" ] || [ -z "$DEPLOY_MIGRATE_URL" ]; then
            echo "Skip migrate: DEPLOY_KEY / DEPLOY_MIGRATE_URL secrets not set in GitHub."
            exit 0
          fi
          curl -sfS -X POST \
            -H "X-Deploy-Key: $DEPLOY_KEY" \
            "$DEPLOY_MIGRATE_URL"
